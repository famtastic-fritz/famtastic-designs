services:
  database:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DIRECTUS_DB_NAME:-directus}
      POSTGRES_USER: ${DIRECTUS_DB_USER:-directus}
      POSTGRES_PASSWORD: ${DIRECTUS_DB_PASSWORD:-directus}
    volumes:
      - ./database:/var/lib/postgresql/data

  directus:
    image: directus/directus:11.1.0
    restart: unless-stopped
    depends_on:
      - database
    ports:
      - "8055:8055"
    environment:
      KEY: ${DIRECTUS_KEY:-replace-this-directus-key}
      SECRET: ${DIRECTUS_SECRET:-replace-this-directus-secret}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL:-admin@famtasticdesigns.co}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD:-change-this-password}
      DB_CLIENT: pg
      DB_HOST: database
      DB_PORT: 5432
      DB_DATABASE: ${DIRECTUS_DB_NAME:-directus}
      DB_USER: ${DIRECTUS_DB_USER:-directus}
      DB_PASSWORD: ${DIRECTUS_DB_PASSWORD:-directus}
      PUBLIC_URL: ${DIRECTUS_URL:-http://localhost:8055}
      CORS_ENABLED: 'true'
      WEBSOCKETS_ENABLED: 'true'
      EXTENSIONS_AUTO_RELOAD: 'true'
      IMPORT_IP_DENY_LIST: ''
    volumes:
      - ./uploads:/directus/uploads
      - ./extensions:/directus/extensions
